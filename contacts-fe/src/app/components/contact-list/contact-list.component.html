<div class="flex h-screen bg-[#f4f7fb] w-full">

  <!-- Sidebar -->
  <app-side-nav class="w-64 flex-shrink-0 bg-white border-r border-[#e5e7eb] hidden md:block"></app-side-nav>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Top Header -->
    <app-header class="h-16 flex-shrink-0 bg-white border-b border-[#e5e7eb] z-10"></app-header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-4 relative">
      <div class="max-w-6xl mx-auto w-full">



        <!-- Datatable Card -->
        <div>
          <app-datatable [data]="tempContacts" [isLoading]="isLoading">
            <ng-template #actions let-item>
              <div class="flex items-center gap-3">
                <button (click)="onEdit(item)" class="hover:text-blue-500 transition-colors" title="Edit Contact"><i
                    class="bi bi-pencil"></i></button>
                <button (click)="removeContact(item._id)" class="hover:text-red-500 transition-colors"
                  title="Delete Contact"><i class="bi bi-trash"></i></button>
              </div>
            </ng-template>

            <!-- Header Section -->
            <div>
              <h1 class="text-xl font-semibold text-[#111827] mb-0">Directory</h1>
              <p class="text-slate-500 font-medium text-xs m-0">Streamlined contact management for your entire team.</p>
            </div>
          </app-datatable>
        </div>
      </div>
    </main>
  </div>
</div>
