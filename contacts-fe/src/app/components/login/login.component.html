<div class="min-h-screen flex flex-col items-center justify-center bg-[#f4f7fb] relative font-sans">

  <!-- Header Links -->
  <div class="absolute top-0 w-full flex justify-between items-center p-6">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white font-bold">
        <i class="bi bi-person-fill"></i>
      </div>
      <span class="font-bold text-lg text-slate-800 tracking-tight">Contacts</span>
    </div>
    <div class="flex gap-6 text-sm font-medium text-slate-500">
      <a href="#" class="hover:text-slate-800 transition-colors">Help</a>
      <a href="#" class="hover:text-slate-800 transition-colors">Privacy</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="w-full max-w-md px-4 mt-8">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-extrabold text-[#111827] mb-3 tracking-tight">Welcome back</h1>
      <p class="text-slate-500 font-medium text-base">Please enter your details to sign in</p>
    </div>

    <!-- Error/Success Alerts -->
    <div *ngIf="errorMessage" class="mb-4 p-4 text-sm text-red-700 bg-red-100 rounded-lg" role="alert">
      {{ errorMessage }}
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 sm:p-10 border border-slate-100">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <!-- Email Field -->
        <div class="mb-6">
          <label for="email" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Email
            Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="bi bi-envelope text-slate-400"></i>
            </div>
            <input type="email" id="email" formControlName="email" placeholder="name@company.com"
              class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 placeholder:text-slate-400"
              [ngClass]="{'border-red-500 focus:ring-red-500/20 focus:border-red-500': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}">
          </div>
          <div class="text-red-500 text-xs mt-1"
            *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">
            Email is required.
          </div>
          <div class="text-red-500 text-xs mt-1"
            *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
            Please enter a valid email.
          </div>
        </div>

        <!-- Password Field -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-2">
            <label for="password"
              class="block text-xs font-bold text-slate-600 uppercase tracking-wider">Password</label>
            <a href="#" class="text-xs font-semibold text-blue-500 hover:text-blue-600 transition-colors">Forgot
              password?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="bi bi-lock text-slate-400"></i>
            </div>
            <input type="password" id="password" formControlName="password" placeholder="••••••••"
              class="block w-full pl-10 pr-10 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 tracking-widest placeholder:tracking-normal placeholder:text-slate-400"
              [ngClass]="{'border-red-500 focus:ring-red-500/20 focus:border-red-500': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
              <i class="bi bi-eye text-slate-400 hover:text-slate-600 transition-colors"></i>
            </div>
          </div>
          <div class="text-red-500 text-xs mt-1"
            *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">
            Password is required.
          </div>
        </div>

        <!-- Keep me signed in -->
        <div class="flex items-center mb-8">
          <input id="remember" type="checkbox"
            class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer transition-all">
          <label for="remember" class="ml-2 text-sm font-medium text-slate-600 cursor-pointer">Keep me signed in</label>
        </div>

        <!-- Submit Button -->
        <button type="submit"
          class="w-full text-white bg-blue-500 hover:bg-blue-600 focus:ring-4 focus:ring-blue-500/30 font-semibold rounded-xl text-sm px-5 py-3.5 text-center flex justify-center items-center gap-2 transition-all shadow-sm">
          Sign In
          <i class="bi bi-arrow-right"></i>
        </button>

        <!-- Divider -->
        <div class="relative flex py-8 items-center">
          <div class="flex-grow border-t border-slate-200"></div>
          <span class="flex-shrink-0 mx-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Or continue
            with</span>
          <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <!-- Social Buttons -->
        <!-- <div class="flex gap-4">
          <button type="button"
            class="w-full flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-sm font-semibold text-slate-700">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
            Google
          </button>
          <button type="button"
            class="w-full flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-sm font-semibold text-slate-700">
            <i class="bi bi-linkedin text-[#0A66C2] text-lg"></i>
            LinkedIn
          </button>
        </div> -->
      </form>
    </div>

    <!-- Sign up Link -->
    <div class="text-center mt-10">
      <p class="text-sm font-medium text-slate-600 mb-0">Don't have an account? <a routerLink="/register"
          class="text-blue-500 hover:text-blue-600 font-bold transition-colors">Create an account</a></p>
    </div>
  </div>

  <!-- Footer -->
  <!-- <div class="absolute bottom-6 w-full text-center">
    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em]">© 2024 ContactFlow Inc. • Built for Professionals</p>
  </div> -->
</div>
