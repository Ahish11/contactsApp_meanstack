<div class="min-h-screen bg-[#f4f7fb] flex flex-col">

  <!-- Header -->
  <header
    class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <div class="flex items-center gap-3">
      <button (click)="goBack()" class="hover:bg-slate-100 px-2 py-1 rounded-md transition-colors" title="Back">
        <i class="bi bi-arrow-left text-black"></i>
      </button>
      <div class="text-lg font-semibold">{{ isEditMode ? 'Edit Contact' : 'Add Contact' }}</div>
    </div>
    <div class="flex items-center gap-3">
      <button routerLink="/home"
        class="px-5 py-2 text-sm font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors shadow-sm">
        Cancel
      </button>
      <button [disabled]="AddContactForm.invalid" (click)="addRecord()"
        class="px-5 py-2 text-sm font-bold text-white bg-blue-500 hover:bg-blue-600 rounded-lg transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isEditMode ? 'Update' : 'Save' }}
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 w-full max-w-2xl mx-auto px-4 py-8 relative pb-20">

    <!-- Profile Photo Section -->
    <div class="flex flex-col items-center mb-8">
      <div class="relative mb-4">
        <div
          class="w-24 h-24 rounded-full border-4 border-white bg-slate-200 shadow-sm overflow-hidden flex items-center justify-center">
          <img src="https://ui-avatars.com/api/?name=New+Contact&background=cbd5e1&color=fff&size=128" alt="Avatar"
            class="w-full h-full object-cover">
        </div>
        <button
          class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center border-2 border-white hover:bg-blue-600 transition-colors shadow-sm">
          <i class="bi bi-camera-fill text-xs"></i>
        </button>
      </div>
      <h2 class="text-2xl font-semibold text-[#111827] m-0">{{ isEditMode ? 'Edit Contact' : 'New Contact' }}</h2>
      <p class="text-sm font-medium text-slate-500 mt-1">Add personal and professional details</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-[20px] shadow-[0_2px_15px_-3px_rgba(0,0,0,0.03)] border border-[#e5e7eb] p-8 mt-4">
      <form [formGroup]="AddContactForm">

        <!-- Full Name -->
        <div class="mb-5">
          <label class="block text-xs font-bold text-slate-800 mb-2">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="bi bi-person-fill text-slate-400"></i>
            </div>
            <input type="text" formControlName="name" placeholder="John Doe"
              class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 bg-slate-50/50 focus:bg-white placeholder:text-slate-400">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
          <!-- Email Address -->
          <div>
            <label class="block text-xs font-bold text-slate-800 mb-2">Email Address</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="bi bi-envelope-fill text-slate-400"></i>
              </div>
              <input type="email" formControlName="email" placeholder="john@example.com"
                class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 bg-slate-50/50 focus:bg-white placeholder:text-slate-400">
            </div>
          </div>

          <!-- Phone Number -->
          <div>
            <label class="block text-xs font-bold text-slate-800 mb-2">Phone Number</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="bi bi-telephone-fill text-slate-400"></i>
              </div>
              <input type="text" formControlName="phone" placeholder="+1 (555) 000-0000"
                class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 bg-slate-50/50 focus:bg-white placeholder:text-slate-400">
            </div>
          </div>

          <!-- Company -->
          <div>
            <label class="block text-xs font-bold text-slate-800 mb-2">Company</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="bi bi-building text-slate-400"></i>
              </div>
              <input type="text" formControlName="company" placeholder="Acme Inc."
                class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 bg-slate-50/50 focus:bg-white placeholder:text-slate-400">
            </div>
          </div>

          <!-- Job Title -->
          <div>
            <label class="block text-xs font-bold text-slate-800 mb-2">Job Title</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="bi bi-briefcase-fill text-slate-400"></i>
              </div>
              <input type="text" formControlName="jobTitle" placeholder="Software Engineer"
                class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 bg-slate-50/50 focus:bg-white placeholder:text-slate-400">
            </div>
          </div>
        </div>

        <!-- Tags -->
        <!-- <div class="mb-5">
          <label class="block text-xs font-bold text-slate-800 mb-2">Tags</label>
          <div class="border border-slate-200 rounded-xl p-3 bg-slate-50/50 flex flex-wrap gap-2 items-center">
            <span
              class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold">
              Client <i
                class="bi bi-x cursor-pointer hover:bg-blue-200 rounded-full w-4 h-4 flex items-center justify-center"></i>
            </span>
            <span
              class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold">
              Q4 Lead <i
                class="bi bi-x cursor-pointer hover:bg-blue-200 rounded-full w-4 h-4 flex items-center justify-center"></i>
            </span>
            <button type="button"
              class="inline-flex items-center gap-1 h-6 px-3 rounded-full border border-dashed border-slate-300 text-slate-500 text-xs font-semibold hover:border-slate-400 hover:text-slate-600 transition-colors bg-white">
              <i class="bi bi-plus text-sm"></i> Add Tag
            </button>
          </div>
        </div> -->

        <!-- Notes -->
        <div>
          <label class="block text-xs font-bold text-slate-800 mb-2">Notes (Optional)</label>
          <textarea formControlName="notes" rows="4" placeholder="Met at the tech conference last month..."
            class="block w-full p-4 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 bg-slate-50/50 focus:bg-white placeholder:text-slate-400 resize-none"></textarea>
        </div>

      </form>
    </div>

  </main>

  <!-- Footer Context -->
  <!-- <div
    class="fixed bottom-0 left-0 w-full p-4 flex justify-between items-center text-xs font-semibold text-slate-500 max-w-2xl translate-x-[calc(50vw-336px)] pointer-events-none">
    <div class="flex items-center gap-1.5 opacity-70">
      <i class="bi bi-lock-fill"></i> Secure encrypted storage
    </div>
    <div class="opacity-70">
      Last edited: Just now
    </div>
  </div> -->

</div>
