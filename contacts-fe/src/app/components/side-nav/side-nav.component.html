<div class="h-full flex flex-col justify-between py-6">
  <div>
    <!-- Workspace Info -->
    <div class="flex items-center gap-3 px-6 mb-8 cursor-pointer">
      <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-sm">
        <i class="bi bi-grid-fill text-xl"></i>
      </div>
      <div>
        <h2 class="font-bold text-slate-900 text-[15px] leading-tight flex items-center gap-1">Notion Workspace</h2>
        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400 m-0">Data Management</p>
      </div>
    </div>

    <!-- Navigation Links -->
    <nav class="px-3 flex flex-col gap-1">
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors font-medium text-sm">
        <i class="bi bi-grid text-lg w-5 text-center text-slate-600"></i>
        Dashboard
      </a>
      <a href="/home" class="flex items-center gap-3 px-3 py-2.5 bg-blue-500 text-white rounded-lg font-medium text-sm shadow-sm">
        <i class="bi bi-server text-lg w-5 text-center text-white"></i>
        Records
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors font-medium text-sm">
        <i class="bi bi-people-fill text-lg w-5 text-center text-slate-600"></i>
        Members
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors font-medium text-sm">
        <i class="bi bi-gear-fill text-lg w-5 text-center text-slate-600"></i>
        Settings
      </a>
    </nav>
  </div>

  <!-- Bottom Profile -->
  <div class="px-6 border-t border-slate-100 pt-6">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 bg-orange-200 rounded-full flex items-center justify-center text-orange-700 font-bold overflow-hidden shadow-sm">
        <i class="bi bi-person-fill text-xl"></i>
      </div>
      <div>
        <p class="font-bold text-slate-900 text-sm m-0">Alex Rivera</p>
        <p class="text-[11px] font-medium text-slate-500 m-0">Administrator</p>
      </div>
    </div>
    
    <button (click)="logout()" class="w-full flex items-center justify-center gap-2 py-2 px-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-sm font-bold text-slate-700 shadow-sm">
      <i class="bi bi-box-arrow-right"></i>
      Logout
    </button>
  </div>
</div>
